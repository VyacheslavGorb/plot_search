<!DOCTYPE html>
<html>
<head>
    <title>Parcel Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { padding: 0; margin: 0; background-color: #1a1a1a; }
        html, body, #map { height: 100%; width: 100vw; }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <!-- Telegram WebApp JS -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Wicket (WKT parser) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wicket/1.3.8/wicket.min.js"></script>

    <script>
        // Initialize Telegram WebApp
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        
        // Initialize map
        var map = L.map('map').setView([52.2297, 21.0122], 10);
        
        // Dark theme tiles suitable for Telegram
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap © CARTO'
        }).addTo(map);

        const urlParams = new URLSearchParams(window.location.search);
        let wktString = urlParams.get('wkt');
        const lat = urlParams.get('lat');
        const lon = urlParams.get('lon');

        if (wktString) {
            try {
                // If WKT is encoded or compressed, handle it. Assuming standard WKT:
                wktString = decodeURIComponent(wktString);
                var wkt = new Wkt.Wkt();
                wkt.read(wktString);
                
                // Convert WKT object to Leaflet layer
                var geojson = wkt.toJson();
                var feature = L.geoJSON(geojson, {
                    style: function (feature) {
                        return {color: '#3388ff', weight: 3, opacity: 0.8, fillOpacity: 0.3};
                    }
                }).addTo(map);
                
                map.fitBounds(feature.getBounds(), { padding: [50, 50] });
            } catch (e) {
                console.error("Error parsing WKT:", e);
                addMarkerFallback(lat, lon);
            }
        } else {
            addMarkerFallback(lat, lon);
        }

        function addMarkerFallback(lat, lon) {
            if (lat && lon) {
                L.marker([lat, lon]).addTo(map);
                map.setView([lat, lon], 15);
            }
        }
    </script>
</body>
</html>
